services:
  iso-builder:
    build: .
    image: endeavouros-aarch64-builder:latest
    container_name: endeavouros-iso-builder
    volumes:
      # Mount project directory
      - .:/workspace
      # Use build cache outside container
      - build-cache:/workspace/work
      - out-cache:/workspace/out
    privileged: true
    stdin_open: true
    tty: true

volumes:
  build-cache:
  out-cache:
